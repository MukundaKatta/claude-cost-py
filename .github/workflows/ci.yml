name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: pytest
        run: python -m pytest tests/ -v

      - name: Import smoke
        run: |
          python -c "from claude_cost import default_pricing, Usage; \
                     p = default_pricing('claude-sonnet-4-5'); \
                     c = p.cost_for(Usage(input_tokens=1_000_000)); \
                     assert c == 3.0, f'expected 3.0, got {c}'; \
                     print('OK — claude-cost imports + computes')"
